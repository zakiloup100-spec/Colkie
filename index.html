<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Cookie Clicker</title>

<style>
body {
  margin: 0;
  background: #2b1d12;
  color: white;
  font-family: Arial;
  text-align: center;
}

.container {
  padding: 20px;
}

.cookie {
  font-size: 80px;
  cursor: pointer;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="container">
  <h1>🍪 Cookie Clicker</h1>
  
  <h2 id="cookies">0</h2>
  <p>Par clic : <span id="perClick">1</span></p>
  <p>Par seconde : <span id="perSecond">0</span></p>

  <div class="cookie" onclick="clickCookie()">🍪</div>

  <h3>Shop</h3>
  <button onclick="buyGrandma()">👵 Grandma (25)</button>
  <button onclick="buyFactory()">🏭 Factory (100)</button>
</div>

<hr>

<div>
  <button id="startLore">Mode Secret 👁️</button>
</div>

<div id="loreBox" style="display:none;">
  <p id="loreText">...</p>
  <button onclick="nextLore()">Continuer</button>
</div>

<script>

// ===== COOKIE GAME =====
let cookies = 0;
let perClick = 1;
let perSecond = 0;

function clickCookie() {
  cookies += perClick;
  updateUI();
}

function buyGrandma() {
  if (cookies >= 25) {
    cookies -= 25;
    perSecond += 1;
    updateUI();
  }
}

function buyFactory() {
  if (cookies >= 100) {
    cookies -= 100;
    perSecond += 5;
    updateUI();
  }
}

function updateUI() {
  document.getElementById("cookies").textContent = cookies;
  document.getElementById("perClick").textContent = perClick;
  document.getElementById("perSecond").textContent = perSecond;
}

setInterval(() => {
  cookies += perSecond;
  updateUI();
}, 1000);

// ===== LORE DARK =====
const loreBtn = document.getElementById("startLore");
const loreBox = document.getElementById("loreBox");
const loreText = document.getElementById("loreText");

let loreStep = 0;

const loreLines = [
  "Tu trouves un vieux tuyau...",
  "Le monde devient silencieux...",
  "Une silhouette apparaît...",
  "Ses yeux deviennent rouges...",
  "Elle te regarde sans bouger...",
  "Tu n’es pas seul ici.",
  "Le château n'existe pas.",
  "Tout est faux.",
  "GAME OVER."
];

loreBtn.addEventListener("click", () => {
  loreBox.style.display = "block";
  loreStep = 0;
  loreText.textContent = loreLines[loreStep];
});

function nextLore() {
  loreStep++;
  if (loreStep < loreLines.length) {
    loreText.textContent = loreLines[loreStep];
  } else {
    document.body.style.background = "black";
    loreText.textContent = "GAME OVER.";
  }
}

</script>

</body>
</html>

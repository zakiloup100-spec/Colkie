</head>

<body>

<div id="game">

  <div id="world"></div>

  <div id="hud">

    <div class="pill" id="coinsTxt">Pièces: 0</div>

    <div class="pill" id="stateTxt">Petit</div>

  </div>

  <div id="banner">v5 • blocs cassables + lucky blocks + champignon 🍄</div>

  <div id="msg"></div>

  <div id="controls">

    <div class="cluster">

      <div class="btn" id="leftBtn">◀</div>

      <div class="btn" id="rightBtn">▶</div>

    </div>

    <div class="cluster">

      <div class="btn" id="jumpBtn">▲</div>

    </div>

  </div>

</div>

<script>

(function(){

  const world = document.getElementById('world');

  const msg = document.getElementById('msg');

  const coinsTxt = document.getElementById('coinsTxt');

  const stateTxt = document.getElementById('stateTxt');

  const banner = document.getElementById('banner');

  let groundY = Math.min(window.innerHeight - 92, 660);

  let worldW = 4200;

  const solids = [];

  const spikes = [];

  const coins = [];

  const enemies = [];

  const breakables = [];

  const luckyBlocks = [];

  const mushrooms = [];

  let playerEl;

  function make(tag, cls, style, html=''){

    const el = document.createElement(tag);

    if(cls) el.className = cls;

    if(style) Object.assign(el.style, style);

    if(html) el.innerHTML = html;

    world.appendChild(el);

    return el;

  }

  function obj(el, x, y, w, h, type='solid'){

    return {el, x, y, w, h, type, active:true};

  }

  function addBreakable(x,y){

    const el = make('div','brick',{left:x+'px', top:y+'px'});

    const o = obj(el,x,y,48,48,'breakable');

    breakables.push(o);

    solids.push(o);

  }

  function addLucky(x,y){

    const el = make('div','qblock',{left:x+'px', top:y+'px'}, '?');

    const o = obj(el,x,y,48,48,'lucky');

    o.used = false;

    luckyBlocks.push(o);

    solids.push(o);

  }

  function spawnMushroom(x,y){

    const el = make('div','mushroom',{left:x+'px', top:y+'px'},

      '<div class="cap"></div><div class="dot1"></div><div class="dot2"></div><div class="stem"></div>');

    mushrooms.push({el, x, y, w:34, h:34, vx:1.2, vy:0, active:true});

  }

  function buildLevel(){

    world.innerHTML = '';

    solids.length = spikes.length = coins.length = enemies.length = breakables.length = luckyBlocks.length = mushrooms.length = 0;

    for(let i=0;i<8;i++){

      make('div','cloud',{

        left:(120 + i*520)+'px', top:(70 + (i%3)*42)+'px',

        width:(100 + (i%2)*30)+'px', height:(44 + (i%2)*10)+'px'

      });

    }

    for(let i=0;i<7;i++){

      make('div','hill',{

        left:(i*620 + 40)+'px', bottom:'110px',

        width:(180 + (i%2)*40)+'px', height:(95 + (i%2)*20)+'px'

      });

    }

    for(let i=0;i<20;i++){

      make('div','bush',{

        left:(i*210 + 40)+'px', bottom:'70px',

        width:(70 + (i%3)*18)+'px', height:(30 + (i%2)*8)+'px'

      });

    }

    const gSegs = [[0,430],[520,420],[1030,370],[1490,420],[2040,380],[2540,340],[3000,600]];

    gSegs.forEach(([x,w])=>{

      const el = make('div','groundSeg',{left:x+'px', top:groundY+'px', width:w+'px'});

      solids.push(obj(el,x,groundY,w,110,'ground'));

    });

    const plats = [

      [220, groundY-140, 110, 24],

      [410, groundY-240, 110, 24],

      [650, groundY-340, 120, 24],

      [860, groundY-250, 110, 24],

      [1120, groundY-150, 120, 24],

      [1300, groundY-250, 120, 24],

      [1570, groundY-190, 120, 24],

      [1750, groundY-300, 120, 24],

      [1930, groundY-410, 120, 24],

      [2130, groundY-170, 120, 24],

      [2330, groundY-270, 120, 24],

      [2580, groundY-150, 120, 24],

      [2770, groundY-260, 120, 24],

      [2970, groundY-360, 120, 24],

      [3190, groundY-250, 120, 24]

    ];

    plats.forEach(([x,y,w,h])=>{

      const el = make('div','platform',{left:x+'px', top:y+'px', width:w+'px', height:h+'px'});

      solids.push(obj(el,x,y,w,h,'platform'));

    });

    [[930, groundY-120, 90, 120],[2420, groundY-160, 100, 160]].forEach(([x,y,w,h])=>{

      const el = make('div','pipe',{left:x+'px', top:y+'px', width:w+'px', height:h+'px'});

      solids.push(obj(el,x,y,w,h,'pipe'));

    });

    // brick/lucky zone

    addBreakable(500, groundY-420);

    addBreakable(548, groundY-420);

    addLucky(596, groundY-420);

    addBreakable(644, groundY-420);

    addBreakable(1700, groundY-480);

    addLucky(1748, groundY-480);

    addBreakable(1796, groundY-480);

    addLucky(2860, groundY-420);

    addBreakable(2908, groundY-420);

    const spikeList = [

      [450, groundY-34],[482, groundY-34],

      [760, groundY-34],[792, groundY-34],[824, groundY-34],

      [1370, groundY-34],[1402, groundY-34],

      [1680, groundY-224],[1712, groundY-224],

      [2480, groundY-34],[2512, groundY-34],

      [3020, groundY-394],[3052, groundY-394]

    ];

    spikeList.forEach(([x,y])=>{

      const el = make('div','spike',{left:x+'px', top:y+'px'});

      spikes.push(obj(el,x,y,32,34,'spike'));

    });

    const coinList = [

      [252, groundY-190],[450, groundY-290],[690, groundY-390],[890, groundY-300],

      [1145, groundY-200],[1335, groundY-300],

      [1585, groundY-240],[1765, groundY-350],[1945, groundY-460],

      [2145, groundY-220],[2360, groundY-320],

      [2605, groundY-200],[2800, groundY-310],[3000, groundY-410],[3215, groundY-300]

    ];

    coinList.forEach(([x,y])=>{

      const el = make('div','coin',{left:x+'px', top:y+'px'});

      coins.push(obj(el,x,y,24,24,'coin'));

    });

    const enemyList = [

      [580, groundY-38, 540, 880],

      [1135, groundY-188, 1120, 1235],

      [2140, groundY-208, 2130, 2240],

      [3200, groundY-288, 3190, 3330]

    ];

    enemyList.forEach(([x,y,minX,maxX])=>{

      const el = make('div','enemy',{left:x+'px', top:y+'px'}, '<div class="mouth"></div>');

      enemies.push({el,x,y,w:42,h:38,minX,maxX,vx:1.25,active:true});

    });

    make('div','flagpole',{left:'3920px', top:(groundY-220)+'px', height:'220px'});

    make('div','flag',{left:'3930px', top:(groundY-208)+'px'});

    playerEl = make('div','player',{left:'80px', top:(groundY-58)+'px'},

      '<div class="hatTop"></div><div class="hatBrim"></div><div class="head"></div><div class="body"></div><div class="overalls"></div><div class="armL"></div><div class="armR"></div><div class="shoeL"></div><div class="shoeR"></div><div class="eyeL"></div><div class="eyeR"></div><div class="moust"></div>');

  }

  buildLevel();

  setTimeout(()=>banner.style.opacity='0', 2200);

  setTimeout(()=>banner.style.display='none', 2800);

  const state = {

    x:80, y:groundY-58, w:42, h:58, vx:0, vy:0,

    left:false, right:false, up:false, onGround:false,

    coins:0, big:false, inv:0, won:false

  };

  function updateStateLabel(){

    stateTxt.textContent = state.big ? 'Grand 🍄' : 'Petit';

  }

  function bind(code,val){

    if(code==='ArrowLeft'||code==='KeyA') state.left=val;

    if(code==='ArrowRight'||code==='KeyD') state.right=val;

    if(code==='ArrowUp'||code==='KeyW'||code==='Space') state.up=val;

  }

  addEventListener('keydown', e=>{ bind(e.code,true); if(['ArrowLeft','ArrowRight','ArrowUp','Space'].includes(e.code)) e.preventDefault(); }, {passive:false});

  addEventListener('keyup', e=>bind(e.code,false));

  function hold(id,key){

    const el=document.getElementById(id);

    const on=e=>{e.preventDefault(); state[key]=true;};

    const off=e=>{e.preventDefault(); state[key]=false;};

    el.addEventListener('touchstart',on,{passive:false});

    el.addEventListener('touchend',off,{passive:false});

    el.addEventListener('touchcancel',off,{passive:false});

    el.addEventListener('mousedown',on);

    addEventListener('mouseup',off);

    el.addEventListener('mouseleave',off);

  }

  hold('leftBtn','left'); hold('rightBtn','right'); hold('jumpBtn','up');

  function hit(a,b){

    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;

  }

  function playerBox(){

    return {x:state.x,y:state.y,w:state.w,h:state.h};

  }

  function growPlayer(){

    if(state.big) return;

    state.big = true;

    state.h = 76;

    state.y -= 18;

    playerEl.classList.add('big');

    updateStateLabel();

  }

  function shrinkPlayer(){

    if(!state.big){

      respawn();

      return;

    }

    state.big = false;

    state.h = 58;

    state.y += 18;

    playerEl.classList.remove('big');

    state.inv = 90;

    updateStateLabel();

  }

  function respawn(){

    state.x=80; state.y=groundY-(state.big?76:58); state.vx=0; state.vy=0;

  }

  function damage(){

    if(state.inv>0 || state.won) return;

    shrinkPlayer();

  }

  function resetAll(){

    state.coins=0; state.big=false; state.inv=0; state.won=false;

    coinsTxt.textContent='Pièces: 0';

    buildLevel();

    updateStateLabel();

    respawn();

    msg.style.display='none';

  }

  addEventListener('pointerdown', ()=>{ if(state.won) resetAll(); }, {passive:true});

  function removeSolid(ref){

    const idx = solids.indexOf(ref);

    if(idx >= 0) solids.splice(idx,1);

  }

  function collide(axis){

    const a = playerBox();

    for(const s of solids){

      if(!s.active || !hit(a,s)) continue;

      if(axis==='x'){

        if(state.vx>0) state.x = s.x - state.w;

        else if(state.vx<0) state.x = s.x + s.w;

        state.vx = 0;

      } else {

        if(state.vy>0){

          state.y = s.y - state.h;

          state.vy = 0;

          state.onGround = true;

        } else if(state.vy<0){

          // hit block from below

          state.y = s.y + s.h;

          state.vy = 0;

          if(s.type === 'breakable' && state.big){

            s.active = false;

            s.el.style.display = 'none';

            removeSolid(s);

          } else if(s.type === 'lucky' && !s.used){

            s.used = true;

            s.el.classList.add('used');

            s.el.textContent = '';

            spawnMushroom(s.x + 7, s.y - 38);

          }

        }

      }

    }

  }

  function updateMushrooms(){

    for(const m of mushrooms){

      if(!m.active) continue;

      m.vy += 0.55;

      if(m.vy > 12) m.vy = 12;

      // horizontal move

      m.x += m.vx;

      const mr = {x:m.x,y:m.y,w:m.w,h:m.h};

      for(const s of solids){

        if(!s.active) continue;

        if(hit(mr,s)){

          if(m.vx > 0) m.x = s.x - m.w;

          else m.x = s.x + s.w;

          m.vx *= -1;

        }

      }

      // vertical move

      m.y += m.vy;

      const mr2 = {x:m.x,y:m.y,w:m.w,h:m.h};

      for(const s of solids){

        if(!s.active) continue;

        if(hit(mr2,s)){

          if(m.vy > 0){

            m.y = s.y - m.h;

            m.vy = 0;

          } else if(m.vy < 0){

            m.y = s.y + s.h;

            m.vy = 0;

          }

        }

      }

      if(hit(playerBox(), {x:m.x,y:m.y,w:m.w,h:m.h})){

        m.active = false;

        m.el.style.display = 'none';

        growPlayer();

      }

      m.el.style.left = m.x + 'px';

      m.el.style.top = m.y + 'px';

    }

  }

  function update(){

    if(state.won) return;

    state.onGround=false;

    if(state.left) state.vx -= 0.72;

    if(state.right) state.vx += 0.72;

    if(!state.left && !state.right) state.vx *= 0.84;

    if(state.vx>6.2) state.vx=6.2;

    if(state.vx<-6.2) state.vx=-6.2;

    if(state.up && state.onGround){

      state.vy = -13.2;

      state.onGround = false;

    }

    state.vy += 0.62;

    if(state.vy>14) state.vy=14;

    state.x += state.vx;

    collide('x');

    state.y += state.vy;

    collide('y');

    if(state.y > window.innerHeight + 120){

      respawn();

    }

    const a = playerBox();

    coins.forEach(c=>{

      if(!c.active) return;

      if(hit(a,c)){

        c.active=false;

        c.el.style.display='none';

        state.coins++;

        coinsTxt.textContent='Pièces: '+state.coins;

      }

    });

    spikes.forEach(s=>{ if(s.active && hit(a,s)) damage(); });

    enemies.forEach(e=>{

      if(!e.active) return;

      e.x += e.vx;

      if(e.x < e.minX || e.x > e.maxX) e.vx *= -1;

      e.el.style.left = e.x+'px';

      const b = {x:e.x,y:e.y,w:e.w,h:e.h};

      if(hit(a,b)){

        if(state.vy > 1 && (state.y + state.h - e.y) < 20){

          e.active=false;

          e.el.style.display='none';

          state.vy = -8.5;

        } else {

          damage();

        }

      }

    });

    updateMushrooms();

    if(state.inv>0) state.inv--;

    if(state.x > 3880){

      state.won = true;

      msg.style.display='block';

      msg.innerHTML='Bravooo 🎉<br>Tu peux casser des blocs et devenir grand';

    }

    playerEl.style.left = state.x+'px';

    playerEl.style.top = state.y+'px';

    playerEl.style.opacity = (state.inv>0 && Math.floor(state.inv/6)%2===0) ? '0.35' : '1';

    const cam = Math.max(0, Math.min(worldW - window.innerWidth, state.x - window.innerWidth*0.35));

    world.style.transform = 'translateX(' + (-cam) + 'px)';

  }

  function loop(){

    update();

    requestAnimationFrame(loop);

  }

  updateStateLabel();

  loop();

})();

</script>

</body>

</html>
